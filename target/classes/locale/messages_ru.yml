messages:
  ###########################################################################################################
  ##############################                    raids                      ##############################
  ###########################################################################################################
  raids-no-commands:
    enable: true
    text:
      - ' '
      - '%design_clr_primary%Команды в рейде %design_clr_main%отключены.'
      - ' '
  raids-already-met:
    enable: true
    text:
      - ' '
      - '%design_clr_primary%Рейд можно посетить только %design_clr_main%1 раз.'
      - ' '
  raids-time-to-death:
    enable: true
    text:
      - ' '
      - '%design_clr_primary%У вас осталось %design_clr_main%{time} секунд%design_clr_primary%,
      чтобы покинуть рейд!'
      - '%design_clr_primary%Используйте %design_clr_main%энд-портал в центре карты
      %design_clr_primary%для выхода!'
      - ' '
  raids-event-start:
    enable: true
    text:
      - ' '
      - '  %img_miner3% %design_clr_main%Рейдовый мир появился'
      - '             %design_clr_primary%Координаты портала %design_clr_main%{location}'
      - '             %design_clr_primary%Выход только %design_clr_main%через обратный
      портал'
      - '             %design_clr_main%Команды отключены'
      - ' '
  raids-event-end:
    enable: true
    text:
      - ' '
      - '  %img_miner3% %design_clr_main% Рейд закончен. Топ игроков: '
      - '{players}'
  raids-event-end-empty:
    enable: true
    text:
      - ' '
      - '  %img_miner3% %design_clr_main% Рейд закончен.'
      - '%design_clr_primary%             Никто не выбрался живым...'
      - ' '
      - ' '
  raids-event-end-bonus:
    variables:
      place:
        1: "первое место"
        2: "второе место"
        3: "третье место"
        4: "четвертое место"
      other: "участие"
    enable: true
    text:
      - ' '
      - '  %design_clr_primary%Вы вынесли с рейда &f&r%img_money%%design_clr_money%{raid_amount}'
      - '  %design_clr_primary%Вам выдана награда &f&r%img_donate-icon%%design_clr_donat-money%{bonus_amount}%design_clr_primary% за %design_clr_main%{place}'
      - ' '
#  raids-event-announce-5min:
#    enable: true
#    text:
#      - ' '
#      - '%design_clr_primary%Рейд начнется через %design_clr_main%5 минут!'
#      - ' '
  raids-death-by-quit:
    enable: true
    text:
      - ' '
      - '%design_clr_primary%Игрок %pFormat_{player}_mini% %design_clr_primary%покинул рейд и был %design_clr_main%уничтожен!'
      - ' '
###########################################################################################################
##############################                scheduler                      ##############################
###########################################################################################################
  scheduler-disabled:
    enable: true
    text:
      - ' &cПланировщик событий в данный момент остановлен.'
  scheduler-empty:
    enable: true
    text:
      - ' &cВ очереди нет запланированных событий.'
  scheduler-error-null:
    enable: true
    text:
      - ' &cОшибка: следующее событие повреждено (null).'

  # Когда событие уже идет
  scheduler-info-running:
    enable: true
    text:
      - ' '
      - '  %design_clr_primary%Сейчас идет событие!'
      - '  %design_clr_primary%До следующего (%design_clr_main%{next_event}%design_clr_primary%): &b{time} сек.'
      - ' '

  # Когда сервер просто ожидает запуска следующего события
  scheduler-info-waiting:
    enable: true
    text:
      - ' '
      - '  %design_clr_primary%Следующее событие (%design_clr_main%{next_event}%design_clr_primary%) начнется через: &b{time} сек.'
      - ' '
  scheduler-event-already-started:
    enable: true
    text:
      - ' '
      - '  %design_clr_main%[Ошибка] %design_clr_primary%Эвент уже запущен. Сначала отмените событие. Сообщите админу'
      - ' '
  scheduler-no-events-stopped:
    type: chat
    enable: true
    text:
      - ' '
      - '  %design_clr_main%[Ошибка] %design_clr_primary%Не найдено событий, планировщик остановлен'
      - ' '
  scheduler-event-is-null:
    type: chat
    enable: true
    text:
      - ' '
      - '  %design_clr_main%[SatanicRaids] %design_clr_primary%Событие не может запуститься т.к оно null'
      - ' '

  scheduler-event-duration-too-long:
    type: chat
    enable: true
    text:
      - ' '
      - '  %design_clr_main%[Ошибка] %design_clr_primary%Событие не может длиться дольше, чем будет запущено следующее событие'
      - ' '
  scheduler-event-already-running:
    type: chat
    enable: true
    text:
      - ' '
      - '  %design_clr_main%[Ошибка] %design_clr_primary%Событие уже запущено. Остановите его командой'
      - ' '
  scheduler-turned-off:
    type: chat
    enable: true
    text:
      - ' '
      - '  %design_clr_main%[SatanicEvents] %design_clr_primary%Планировщик был выключен'
      - ' '
  scheduler-not-disabled:
    type: chat
    enable: true
    text:
      - ' '
      - '  %design_clr_main%[SatanicEvents] %design_clr_primary%Предыдущий планировщик еще работает.'
      - '  %design_clr_main%[SatanicEvents] %design_clr_primary%Сначала выключите планировщик, для запуска нового'
      - ' '
  scheduler-started:
    type: chat
    enable: true
    text:
      - ' '
      - '  %design_clr_main%[SatanicEvents] %design_clr_primary%Планировщик запущен'
      - '  %design_clr_main%[SatanicEvents] %design_clr_primary%Количество событий: %design_clr_main%{amount}'
      - '  %design_clr_main%[SatanicEvents] %design_clr_primary%Эвент будет запущен через %design_clr_main%{after}'
      - ' '
  scheduler-no-events-were-stopped:
    type: chat
    enable: true
    text:
      - ' '
      - '  %design_clr_main%[Ошибка] %design_clr_primary%Не найдено активных событий для остановки'
      - ' '
  scheduler-event-already-ended:
    type: chat
    enable: true
    text:
      - ' '
      - '  %design_clr_main%[SatanicRaids] %design_clr_primary%Событие не было остановлено, так как оно уже завершилось'
      - ' '
  scheduler-event-stopped-success:
    type: chat
    enable: true
    text:
      - ' '
      - '  %design_clr_main%[SatanicRaids] %design_clr_primary%Текущее событие было успешно остановлено вручную'
      - ' '
  scheduler-next-event-started:
    type: chat
    enable: true
    text:
      - ' '
      - '  %design_clr_main%[SatanicRaids] %design_clr_primary%Запущено событие {name}...'
      - ' '